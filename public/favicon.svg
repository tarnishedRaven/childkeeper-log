<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
      @media (prefers-color-scheme: light) {
        circle { fill: #f3e8ff; stroke: #e9d5ff; }
      }
      @media (prefers-color-scheme: dark) {
        circle { fill: #1E1E1E; stroke: #3E3E3E; }
      }
    </style>
    </defs>

    <!-- Background circle -->
    <circle cx="128" cy="128" r="120" class="circle" />

    <!-- Feather quill -->
    <!-- Left side of feather (purple #b0b1fe) -->
    <g>
        <!-- Quill shaft left half -->
        <path
            d="M 128 50 Q 115 80 110 120 Q 108 140 115 180 L 128 180 Q 120 140 122 120 Q 127 80 128 50"
            fill="#b0b1fe" />

        <!-- Feather barbs left side -->
        <path d="M 125 60 Q 100 65 85 62" stroke="#b0b1fe" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 123 75 Q 95 82 75 78" stroke="#b0b1fe" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 122 90 Q 90 100 70 95" stroke="#b0b1fe" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 121 105 Q 88 118 65 112" stroke="#b0b1fe" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 120 120 Q 85 135 60 128" stroke="#b0b1fe" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 120 135 Q 85 150 65 145" stroke="#b0b1fe" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 122 150 Q 92 162 75 160" stroke="#b0b1fe" stroke-width="2" fill="none"
            stroke-linecap="round" />
    </g>

    <!-- Right side of feather (lime green #beff8b) -->
    <g>
        <!-- Quill shaft right half -->
        <path
            d="M 128 50 Q 141 80 146 120 Q 148 140 141 180 L 128 180 Q 136 140 134 120 Q 129 80 128 50"
            fill="#beff8b" />

        <!-- Feather barbs right side -->
        <path d="M 131 60 Q 156 65 171 62" stroke="#beff8b" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 133 75 Q 161 82 181 78" stroke="#beff8b" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 134 90 Q 166 100 186 95" stroke="#beff8b" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 135 105 Q 168 118 191 112" stroke="#beff8b" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 136 120 Q 171 135 196 128" stroke="#beff8b" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 136 135 Q 171 150 191 145" stroke="#beff8b" stroke-width="2" fill="none"
            stroke-linecap="round" />
        <path d="M 134 150 Q 164 162 181 160" stroke="#beff8b" stroke-width="2" fill="none"
            stroke-linecap="round" />
    </g>

    <!-- Quill point (angled tip) -->
    <path d="M 128 180 L 120 210 L 128 205 L 136 210" fill="#b0b1fe" />
    <path d="M 128 180 L 136 210 L 128 205 L 120 210" fill="#beff8b" />
</svg>