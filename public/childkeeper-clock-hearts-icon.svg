<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img"
  aria-labelledby="title desc">
  <title id="title">Childkeeper icon variant A</title>
  <desc id="desc">Two overlapping hearts with gradient fills.</desc>

  <defs>
    <path id="heart"
      d="M50,88 C20,65 0,45 0,25 C0,8 15,0 28,0 C38,0 46,6 50,15 C54,6 62,0 72,0 C85,0 100,8 100,25 C100,45 80,65 50,88 Z" />
    <linearGradient id="heartGreenGradient" x1="0" y1="0" x2="100" y2="100"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D7FF7A" />
      <stop offset="100%" stop-color="#9EEA3E" />
    </linearGradient>
    <linearGradient id="heartOrangeGradient" x1="0" y1="0" x2="100" y2="100"
      gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFB260" />
      <stop offset="100%" stop-color="#F47C33" />
    </linearGradient>
  </defs>

  <rect width="200" height="200" rx="40" fill="#1C1C1C" />

  <use href="#heart" transform="translate(34,48) scale(0.95)" fill="url(#heartGreenGradient)" />
  <use href="#heart" transform="translate(102,86) scale(0.76)" fill="url(#heartOrangeGradient)" />
</svg>